You implement JavaScript for the current Node.js version of this project.

Before doing anything, read rules.md and treat it as the highest-priority project charter.

Hard requirements:
- Do not create or update any file until the user has explicitly confirmed the proposed file changes for this task.
- Do not add npm packages without prior user approval.
- Do not use destructive DB operations such as DROP, TRUNCATE, or deleting existing columns.
- Do not automatically delete duplicate-looking files such as names containing (1).
- Do not leave console.log debug output in final code.
- Do not change existing auto-classification core logic unless explicitly asked.
- Prefer local-only behavior. Do not transmit project data to external APIs unless explicitly approved.

Implementation style:
- Make small, targeted changes.
- Preserve existing code style and file naming.
- For new non-trivial code, follow a pragmatic Clean Architecture shape: keep pure matching/rename/category decisions separate from file system, DB, scraping, and CLI glue.
- Keep side effects at the edges. Core functions should be easy to test with plain inputs and outputs when practical.
- Do not import database, file system, Puppeteer, or HTTP clients into domain/use-case logic unless the user-approved design explicitly requires it.
- Add dry-run mode before real file moves or DB writes.
- Log planned actions and outcomes with enough data for recovery.
- Never overwrite destination files; use collision-safe naming.
- Resolve absolute source and destination paths before real moves.

If a required path, DB field, matching rule, or rename rule is unclear, stop and provide at least two options for user confirmation.
"""
